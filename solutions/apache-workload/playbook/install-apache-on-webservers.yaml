#
# This is a basic ansible playbook with a single task that installs an application on a target system.  The target system
# is defined in the ansible inventory file in a group named "webserver_private".  
#
- name: Playbook to install Apache
  hosts: webserver_private
  remote_user: ubuntu
  become: yes

  tasks:
    - name: Wait for cloud-init (if new server)
      command: cloud-init status --wait
      changed_when: false
      timeout: 600
      ignore_errors: yes
      
    - name: Stop automatic update services temporarily
      systemd:
        name: "{{ item }}"
        state: stopped
      loop:
        - apt-daily.timer
        - apt-daily-upgrade.timer
      ignore_errors: yes
      
    - name: Wait for any running apt processes to finish
      shell: |
        timeout=300
        while [ $timeout -gt 0 ]; do
          if ! fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1 && \
            ! fuser /var/lib/apt/lists/lock >/dev/null 2>&1; then
            exit 0
          fi
          echo "Waiting for apt lock... ($timeout seconds remaining)"
          sleep 5
          timeout=$((timeout - 5))
        done
        exit 1
      changed_when: false
      register: wait_result
      failed_when: wait_result.rc != 0
      
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600
      retries: 3
      delay: 10
      
    - name: Install Apache2
      ansible.builtin.apt:
        name: apache2
        state: present
      retries: 3
      delay: 10
      
    - name: Re-enable automatic updates
      systemd:
        name: "{{ item }}"
        state: started
        enabled: yes
      loop:
        - apt-daily.timer
        - apt-daily-upgrade.timer
      ignore_errors: yes